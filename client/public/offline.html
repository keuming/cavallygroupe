<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cavaly Livres - Mode Hors Ligne</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #FFF9E6 0%, #FFFBF0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
      background: white;
      border-radius: 16px;
      padding: 40px 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #FFC107 0%, #FFA000 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }
    
    h1 {
      color: #1a1a1a;
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: 700;
    }
    
    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .features {
      background: #FFF9E6;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      text-align: left;
    }
    
    .feature {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
      color: #333;
    }
    
    .feature:last-child {
      margin-bottom: 0;
    }
    
    .feature-icon {
      width: 24px;
      height: 24px;
      background: #FFC107;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
    }
    
    .button {
      display: inline-block;
      background: linear-gradient(135deg, #FFC107 0%, #FFA000 100%);
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-size: 16px;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 193, 7, 0.3);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .secondary {
      background: white;
      color: #FFC107;
      border: 2px solid #FFC107;
      margin-left: 10px;
    }
    
    .secondary:hover {
      background: #FFF9E6;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    @media (max-width: 480px) {
      .container {
        padding: 30px 15px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      .secondary {
        margin-left: 0;
      }
      
      .icon {
        width: 100px;
        height: 100px;
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📚</div>
    
    <h1>Mode Hors Ligne</h1>
    <p>Vous êtes actuellement hors ligne. Certaines fonctionnalités ne sont pas disponibles.</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">✓</div>
        <div>Vous pouvez consulter les produits en cache</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <div>Votre panier est sauvegardé localement</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✗</div>
        <div>Les paiements nécessitent une connexion</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✗</div>
        <div>Les commandes se synchroniseront à la reconnexion</div>
      </div>
    </div>
    
    <div class="button-group">
      <button class="button" onclick="goHome()">Aller à l'accueil</button>
      <button class="button secondary" onclick="location.reload()">Réessayer</button>
    </div>
  </div>
  
  <script>
    function goHome() {
      window.location.href = '/';
    }
    
    // Vérifier la connexion réseau
    window.addEventListener('online', () => {
      console.log('[Offline] Connexion rétablie');
      // Recharger la page automatiquement après 2 secondes
      setTimeout(() => {
        location.reload();
      }, 2000);
    });
    
    window.addEventListener('offline', () => {
      console.log('[Offline] Connexion perdue');
    });
  </script>
</body>
</html>
